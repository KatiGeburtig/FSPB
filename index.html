<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html,
        body,
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #streetViewBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            padding: 12px 20px;
            background: #007cba;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        #streetViewBtn:hover {
            background: #005a87;
        }

        #info {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
        }

        #uiControls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .building-collision {
            animation: shake 0.3s ease-in-out;
        }
        #coordsPanel {
            position: absolute;
            top: 70px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            min-width: 220px;
            font-family: monospace;
            font-size: 13px;
        }
        .coord-row { margin: 8px 0; }
        .coord-label { color: #4CAF50; font-weight: bold; min-width: 70px; display: inline-block; }
        input[type="number"] { 
            width: 90px; padding: 4px; 
            background: #333; color: white; 
            border: 1px solid #555; border-radius: 3px;
        }

    </style>
</head>

<body>
    <div id="cesiumContainer"></div>
    <button id="streetViewBtn">Street View Berlin</button>
    <div id="info" >
        <strong>Controls:</strong><br>
        Arrows = Duck movement/rotation<br>
        Mouse = Look around
    </div>

    <div id="coordsPanel">
        <div class="coord-row"><span class="coord-label">📍 Lon:</span> <span id="currentLon">13.4050</span></div>
        <div class="coord-row"><span class="coord-label">📍 Lat:</span> <span id="currentLat">52.5200</span></div>
        <div class="coord-row"><span class="coord-label">🎯 Hdg:</span> <span id="currentHeading">0°</span></div>
        
        <hr style="margin: 12px 0; border-color: #555;">
        
        <div class="coord-row">
            <span class="coord-label">New Lon:</span>
            <input type="number" id="newLon" step="any" value="13.4050">
        </div>
        <div class="coord-row">
            <span class="coord-label">New Lat:</span>
            <input type="number" id="newLat" step="any" value="52.5200">
        </div>
        <div class="coord-row">
            <span class="coord-label">Heading:</span>
            <input type="number" id="newHeading" value="0">
        </div>
        <button id="updateBtn">✨ Teleport Duck</button>
    </div>

  <!-- On-screen controls -->
  <div id="uiControls">
    <div class="control-row">
      <button class="ctrl-btn" id="zoomInBtn">Zoom +</button>
      <button class="ctrl-btn" id="zoomOutBtn">Zoom -</button>
    </div>
    <!--<div class="control-row">
      <button class="ctrl-btn" id="turnLeftBtn">↺</button>
      <button class="ctrl-btn" id="forwardBtn">↑</button>
      <button class="ctrl-btn" id="turnRightBtn">↻</button>
    </div>
    <div class="control-row">
      <button class="ctrl-btn" id="backwardBtn">↓</button>
    </div>-->
  </div>

    <script>
        // 1) Setup viewer with OSM Buildings
        Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwYWE5ZDIyMy0yZjkyLTRmOTAtYmViNC1lY2E4ZWExMTk5OGEiLCJpZCI6MzgyMjMxLCJpYXQiOjE3NjkwOTg2OTN9.oMHO1hKG93R0omwJMmtKxsNfr8HJHI6tWlbz3hcuXfI";

        const viewer = new Cesium.Viewer("cesiumContainer", {
            terrain: Cesium.Terrain.fromWorldTerrain(),
            baseLayerPicker: true,  // Clean street view
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            vrButton: false
        });

        // Add Cesium OSM Buildings (global 3D buildings from OpenStreetMap)
        async function addOSMBuildings() {
            try {
                const buildingsTileset = await Cesium.createOsmBuildingsAsync();
                viewer.scene.primitives.add(buildingsTileset);
                console.log("✅ Buildings loaded");
            } catch (e) { }
        }

        const controller = viewer.scene.screenSpaceCameraController;
        controller.minimumZoomDistance = 1.0;
        controller.enableCollisionDetection = true; // Bounces off ground
        controller.enableLook = true;              // Street view mouse look

        async function flyCameraToStreetView(lon, lat) {
            try {
                const carto = Cesium.Cartographic.fromDegrees(lon, lat);
                const [updated] = await Cesium.sampleTerrainMostDetailed(
                    viewer.terrainProvider, [carto]
                );
                const groundHeight = updated.height || 0;

                const targetPos = Cesium.Cartesian3.fromDegrees(lon, lat, groundHeight + 1.5);
                const cameraPos = Cesium.Cartesian3.fromDegrees(lon, lat, groundHeight + 2.0);

                viewer.camera.lookAt(targetPos, new Cesium.HeadingPitchRange(
                    0, Cesium.Math.toRadians(-15), 8
                ));
            } catch (error) {
                // Fallback if terrain fails
                console.log("Using flat street view");
                viewer.camera.lookAt(
                    Cesium.Cartesian3.fromDegrees(lon, lat, 37),  // Berlin street level
                    new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-15), 8)
                );
            }
        }

        // 3) Scene objects - ADD YOUR 3D MODELS HERE
        const sceneObjects = [
            {
                name: 'Duck Bank',
                url: "./assets/Duck.glb",
                lon: 13.4050,
                lat: 52.5200,
                height: 1.8,  // Street level
                scale: 10.0,
                headingDeg: 0
            }
        ];

        let sceneModels = [];

        async function loadSceneObjects() {
            for (const obj of sceneObjects) {
                try {
                    // 1️⃣ Sample terrain height at exact coordinates
                    const carto = Cesium.Cartographic.fromDegrees(obj.lon, obj.lat);
                    const [updated] = await Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, [carto]);
                    const terrainHeight = updated.height || 0;

                    // 2️⃣ Add safety offset ABOVE terrain (3m total)
                    const finalHeight = terrainHeight + 1.0;

                    const pos = Cesium.Cartesian3.fromDegrees(obj.lon, obj.lat, finalHeight);
                    const hpr = new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(obj.headingDeg), 0, 0);
                    const modelMatrix = Cesium.Transforms.headingPitchRollToFixedFrame(pos, hpr);

                    const model = await Cesium.Model.fromGltfAsync({
                        url: obj.url,
                        modelMatrix,
                        scale: obj.scale,
                        show: true
                    });

                    viewer.scene.primitives.add(model);
                    sceneModels.push({
                        model,
                        state: {
                            ...obj,
                            terrainHeight,  // Store for updates
                            finalHeight     // Store corrected height
                        }
                    });
                    console.log(`✅ ${obj.name}: terrain=${terrainHeight.toFixed(1)}m, placed=${finalHeight.toFixed(1)}m`);
                } catch (error) {
                    console.error(`❌ ${obj.name}:`, error.message);
                }
            }
        }

        function canMoveToPosition(lon, lat) {
            // TINY safe zone = will actually hit boundaries
            const safeZone = 0.000003;  // 1 meter (~0.00001 degrees)
            const lonMin = 13.4045, lonMax = 13.4065;
            const latMin = 52.5195, latMax = 52.5215;

            const result = lon > lonMin + safeZone && lon < lonMax - safeZone &&
                lat > latMin + safeZone && lat < latMax - safeZone;

            console.log(`Collision check: ${lon.toFixed(6)}, ${lat.toFixed(6)} = ${result}`);
            return result;
        }

        function updateAllModels() {
            sceneModels.forEach(({ model, state }) => {
                if (!model || !model.show) return;

                // ✅ FIXED: Use terrain-aware height
                const useHeight = state.finalHeight || state.height || 3.0;
                const pos = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, useHeight);
                const hpr = new Cesium.HeadingPitchRoll(
                    Cesium.Math.toRadians(state.headingDeg), 0, 0
                );
                model.modelMatrix = Cesium.Transforms.headingPitchRollToFixedFrame(pos, hpr);
            });
        }


        // 4) Enhanced keyboard controls
        window.addEventListener("keydown", (e) => {
            if (sceneModels.length === 0) return;

            const state = sceneModels[0].state;  // Duck only
            const moveStepMeters = 1.0;
            const rotStepDeg = 2.0;
            const headingRad = Cesium.Math.toRadians(state.headingDeg);

            // Arrow Up/Down = Forward/Backward
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const direction = e.key === 'ArrowUp' ? 1 : -1;
                const newLon = state.lon + direction * (Math.sin(headingRad) * moveStepMeters) / 111320.0;
                const newLat = state.lat + direction * (Math.cos(headingRad) * moveStepMeters) / 110540.0;

                if (canMoveToPosition(newLon, newLat)) {  // objIndex=0 for duck
                    state.lon = newLon;
                    state.lat = newLat;
                    updateAllModels();
                    console.log("✅ Duck moved");
                } else {
                    console.log("🚫 Duck blocked!");
                    document.body.classList.add('building-collision');
                    setTimeout(() => document.body.classList.remove('building-collision'), 300);
                }
            }
            // Arrow Left/Right = Rotate
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                state.headingDeg += (e.key === 'ArrowRight' ? rotStepDeg : -rotStepDeg);
                updateAllModels();
                console.log("🦆 Duck rotated");
            }
        });

        function teleportElement(lon, lat, heading) {
    const state = sceneModels[0].state;
    state.lon = parseFloat(lon);
    state.lat = parseFloat(lat);
    state.headingDeg = parseFloat(heading);
    
    // ✅ CORRECTED: Array of positions
    Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, 
        [Cesium.Cartographic.fromDegrees(state.lon, state.lat)])
        .then(([updated]) => {
            state.terrainHeight = updated.height || 0;
            state.finalHeight = state.terrainHeight + 1.0;
            updateAllModels();
            flyCameraToStreetView(state.lon, state.lat);
            console.log(`✨ Duck teleported to ${lon}, ${lat}`);
        })
        .catch(err => {
            console.warn("Terrain failed, using default height");
            state.finalHeight = 1.8;
            updateAllModels();
        });
}


        // 5) Event listeners
        document.getElementById('streetViewBtn').addEventListener('click', () => flyCameraToStreetView(13.4050, 52.5200));
        document.getElementById('updateBtn').addEventListener('click', () => {
            const lon = document.getElementById('newLon').value;
            const lat = document.getElementById('newLat').value;
            const heading = document.getElementById('newHeading').value;
            teleportElement(lon, lat, heading);
        });
        document.getElementById('zoomInBtn').addEventListener('click', () => viewer.camera.zoomIn(5));
        document.getElementById('zoomOutBtn').addEventListener('click', () => viewer.camera.zoomOut(5));

        // 6) Initialize
        (async function init() {
            await addOSMBuildings();      // Real Berlin buildings
            await loadSceneObjects();     // Your custom 3D objects
            await flyCameraToStreetView(13.4050, 52.5200);  // Street view
        })();

    </script>
</body>

</html>
