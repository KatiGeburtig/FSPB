<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CesiumJS 3D Editor</title>

    <!-- Cesium -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <!-- Eigene Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div id="cesiumContainer"></div>
    <div id="info">
        <strong>Controls:</strong><br>
        WASD = Movement on Map<br>
        Click on Element = Selection<br>
        Arrows = Movement/rotation of Element<br>
        Mouse + Drag = Movement of Element <br>
        Mouse + Click = Look around<br>
    </div>

    <div id="coordsPanel">
        <div class="coord-row"><span class="coord-label">Lon:</span> <span id="currentLon">13.4050</span></div>
        <div class="coord-row"><span class="coord-label">Lat:</span> <span id="currentLat">52.5200</span></div>
        <div class="coord-row"><span class="coord-label">Dir:</span> <span id="currentHeading">0</span></div>

        <hr style="margin: 12px 0; border-color: #555;">

        <div class="coord-row">
            <span class="coord-label">New Lon:</span>
            <input type="number" id="newLon" step="any" value="13.4050">
        </div>
        <div class="coord-row">
            <span class="coord-label">New Lat:</span>
            <input type="number" id="newLat" step="any" value="52.5200">
        </div>
        <div class="coord-row">
            <span class="coord-label">Heading:</span>
            <input type="number" id="newHeading" value="0">
        </div>

        <button class="ctrl-btn" id="selectFileBtn" style="background-color: gray; color: aliceblue;">Add new
            object</button>
        <input type="file" id="fileInput" accept=".glb,.gltf" style="display:none;">
        <button id="updateBtn">Teleport Element</button>


    </div>

    <div id="uiControls">
        <div id="movementCross">
            <button class="ctrl-btn" id="rotateLeftBtn">
                <img src="/icon/rechts.png" style="width: 32px; height: 32px;">
            </button>
            <button class="ctrl-btn" id="rotateRightBtn">
                <img src="/icon/links.png" style="width: 32px; height: 32px;">
            </button>
            <button class="ctrl-btn" id="moveForwardBtn">
                <img src="/icon/hoch.png" style="width: 32px; height: 32px;">
            </button>
            <button class="ctrl-btn" id="moveBackwardBtn">
                <img src="/icon/unten.png" style="width: 32px; height: 32px;">
            </button>
        </div>
    </div>

    <div id="moveToObject">
        <div>
            <select id="zoomTargetSelect"></select>
            <button id="zoomToObjBtn">Zoom to object</button>
        </div>
    </div>

    <div id="mapControls">
        <div id="zoomControls">
            <button class="ctrl-btn" id="zoomInBtn" style="width: 30px; height: 30px;">+</button>
            <button class="ctrl-btn" id="zoomOutBtn" style="width: 30px; height: 30px;">-</button>
        </div>
        <button id="streetViewBtn">Street View Berlin</button>
    </div>

    <!-- Script -->
    <script src="function.js"></script>

</body>
</html>
